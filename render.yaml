services:
  - type: web
    name: gestion-vehiculos-api
    runtime: node
    plan: starter
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/parking.db
    disk:
      name: parking-data
      mountPath: /var/data
      sizeGB: 1
